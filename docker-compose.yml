services:
  # ── 本機開發：docker compose up -d postgres ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chord-maker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chordmaker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chordmaker}
      POSTGRES_DB: ${POSTGRES_DB:-chordmaker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chordmaker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 完整部署：docker compose --profile full up -d ────────────
  backend:
    profiles: [full]
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: chord-maker-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-chordmaker}:${POSTGRES_PASSWORD:-chordmaker}@postgres:5432/${POSTGRES_DB:-chordmaker}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    profiles: [full]
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: chord-maker-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: